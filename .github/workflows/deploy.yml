name: Deploy

on:
  push:
    branches:
      - main

jobs:
  push_images:
    name: Push images to remote server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Copy images via SSH
        uses: appleboy/scp-action@master
        with:
          host: overridetech.ru
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "templates/images/*.png, templates/images/*.jpg"
          target: "/home/vasya/website/images"
          overwrite: true

  push_html:
    name: Copy nginx files
    runs-on: ubuntu-latest
    needs: [push_images]
    steps:
      - uses: actions/checkout@v3
      - name: Copy .html via SSH
        uses: appleboy/scp-action@master
        with:
          host: overridetech.ru
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "templates/index.html"
          target: "/home/vasya/website"
          overwrite: true
